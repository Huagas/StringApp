name: StringApp CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Lệnh verify sẽ kích hoạt cả Checkstyle, JUnit Test và JaCoCo
      - name: Build, Test and Verify Quality
        run: mvn -B clean verify

      # Lưu lại file .jar (Chỉ lưu trên Ubuntu để tránh trùng)
      - name: Upload Executable Jar
        if: success() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stringapp-jar
          path: target/*.jar
          retention-days: 7

      # Lưu lại báo cáo bao phủ code (JaCoCo)
      - name: Upload Coverage Report
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7